name: "Publish articles to Qiita"

# どのタイミングで実行するかを指定します（例: mainブランチへのpush時、または手動実行）
on:
  push:
    branches:
      - main
  workflow_dispatch: # GitHub上のボタンから手動実行もできるようにします

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # 1. リポジトリのコードをチェックアウト
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js のセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.16.0"

      # 3. qiita-cli のインストール（安全のためローカルインストール）
      - name: Install qiita-cli
        run: npm install @qiita/qiita-cli@v1.8.0

      # 4. 記事の公開
      - name: Publish articles
        run: npx qiita publish --all --root "."
        env:
          # Qiitaトークンはリポジトリの Secrets に登録して呼び出します
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}

      # 5. 差分があればコミットしてプッシュ
      - name: Commit and push diff
        run: |
          git add ./public/*
          if ! git diff --staged --exit-code --quiet; then
            git config --global user.name 'github-actions[bot]'
            git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git commit -m "Updated by qiita-cli"
            git push
          fi
